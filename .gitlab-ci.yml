variables:
  GIT_STRATEGY: clone
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"

stages:
  - lint
  - test
  - package
  - publish

.maven_cache: &maven_cache
  cache:
    key: maven
    paths:
      - .m2/repository
    policy: pull-push

maven lint:
  image: maven:3.9-eclipse-temurin-17
  stage: lint
  <<: *maven_cache
  script:
    - scripts/ci/test-release-version-helpers.sh
    - scripts/ci/test-readme-release-version.sh
    - mvn --batch-mode spotless:check

maven test:
  image: maven:3.9-eclipse-temurin-17
  stage: test
  <<: *maven_cache
  coverage: '/Total line coverage:\s*([0-9]+(?:\.[0-9]+)?)%/'
  script:
    - mvn --batch-mode clean verify
    - awk -f scripts/gitlab-coverage.awk $(find . -path "*/target/site/jacoco/jacoco.csv")
  artifacts:
    when: always
    reports:
      junit:
        - "**/target/surefire-reports/TEST-*.xml"
        - "**/target/failsafe-reports/TEST-*.xml"
      coverage_report:
        coverage_format: jacoco
        path: "**/target/site/jacoco/jacoco.xml"
    paths:
      - "**/target/surefire-reports"
      - "**/target/failsafe-reports"
      - "**/target/site"
    expire_in: "1 week"

maven package:
  image: maven:3.9-eclipse-temurin-17
  stage: package
  <<: *maven_cache
  rules:
    - if: '$CI_COMMIT_TAG'
  script:
    - mvn --batch-mode -DskipTests package
  artifacts:
    paths:
      - "**/target/*.jar"
      - "**/target/*.pom"
    expire_in: "1 week"

maven publish central:
  image: maven:3.9-eclipse-temurin-17
  stage: publish
  <<: *maven_cache
  resource_group: maven-central
  variables:
    GIT_DEPTH: "0"
    USE_CI_JOB_TOKEN_PUSH: "true"
  rules:
    - if: '$CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+$/'
  script:
    - RELEASE_VERSION="$CI_COMMIT_TAG"
    - NEXT_SNAPSHOT="$(scripts/ci/next-snapshot-version.sh "$RELEASE_VERSION")"
    - CENTRAL_SETTINGS="$CI_PROJECT_DIR/target/central-settings.xml"
    - GNUPGHOME="$CI_PROJECT_DIR/.gnupg"
    - export RELEASE_VERSION NEXT_SNAPSHOT CENTRAL_SETTINGS GNUPGHOME
    - scripts/ci/ensure-release-tag.sh "$RELEASE_VERSION"
    - scripts/ci/create-central-settings.sh "$CENTRAL_SETTINGS"
    - scripts/ci/import-maven-gpg-key.sh
    - mvn --batch-mode --settings "$CENTRAL_SETTINGS" -Drevision="$RELEASE_VERSION" -Pcentral-publish clean deploy
    - scripts/ci/print-central-bundle.sh
    - scripts/ci/update-readme-release-version.sh "$RELEASE_VERSION"
    - scripts/ci/set-revision-property.sh "$NEXT_SNAPSHOT"
    - mvn --batch-mode -Drevision="$NEXT_SNAPSHOT" -DskipTests install
    - scripts/ci/commit-next-snapshot.sh "$NEXT_SNAPSHOT"
  artifacts:
    when: always
    paths:
      - "**/target/central-publishing/*.zip"
      - "**/target/central-staging/**"
    expire_in: "1 week"
